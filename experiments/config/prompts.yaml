# Prompt engineering ablation configuration.
# Run with fixed best retrieval config from retrieval_ablation.

experiment_name: "prompt_ablation"

# Fix these to winners from prior experiments before running
embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
retrieval_method: "dense_only"
chunk_size: 512
chunk_overlap: 64

llm:
  model: "llama3.2:latest"
  base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 512

# Adversarial subset from gold_qa.json (category != "standard")
# These are used exclusively for refusal_accuracy metric
adversarial_categories:
  - "out_of_scope"
  - "ambiguous"

# Each template variant; bodies defined in prompt_experiments/templates.py
templates:
  - name: "baseline_zero_shot"     # current production prompt
    is_baseline: true
    few_shot_examples: 0
    chain_of_thought: false
    citation_enforcement: "soft"   # instructed but not structural
    refusal_phrasing: "exact"      # "I don't have enough information..."

  - name: "few_shot_2"
    few_shot_examples: 2
    chain_of_thought: false
    citation_enforcement: "soft"
    refusal_phrasing: "exact"

  - name: "few_shot_3"
    few_shot_examples: 3
    chain_of_thought: false
    citation_enforcement: "soft"
    refusal_phrasing: "exact"

  - name: "cot_zero_shot"
    few_shot_examples: 0
    chain_of_thought: true
    citation_enforcement: "soft"
    refusal_phrasing: "exact"

  - name: "cot_few_shot_2"
    few_shot_examples: 2
    chain_of_thought: true
    citation_enforcement: "soft"
    refusal_phrasing: "exact"

  - name: "structured_citations"
    few_shot_examples: 0
    chain_of_thought: false
    citation_enforcement: "strict"  # structured output format
    refusal_phrasing: "exact"

  - name: "verbose_refusal"
    few_shot_examples: 0
    chain_of_thought: false
    citation_enforcement: "soft"
    refusal_phrasing: "verbose"    # more explanation when refusing

  - name: "concise_bullets"
    few_shot_examples: 0
    chain_of_thought: false
    citation_enforcement: "soft"
    refusal_phrasing: "exact"
    format_instruction: "always_bullets"

# Primary metrics for prompt evaluation
primary_metrics:
  - "faithfulness_llm"         # RAGAS faithfulness (LLM-as-judge)
  - "answer_relevance_llm"     # RAGAS answer relevance
  - "refusal_accuracy"         # % of out-of-scope questions correctly refused
  - "citation_rate"            # % of answers containing at least one [Source:] citation
