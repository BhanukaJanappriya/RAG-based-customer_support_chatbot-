version: "3.9"

services:
  # Local Ollama instance — models are stored in the named volume
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persist ChromaDB and raw docs
      - ./app:/app/app            # live-reload source during dev
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Streamlit UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_ui
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
      - ./app:/app/app
    env_file: .env
    environment:
      - STREAMLIT_API_URL=http://api:8000
    depends_on:
      - api
    command: >
      streamlit run ui/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    restart: unless-stopped

volumes:
  ollama_models:
